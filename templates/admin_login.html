{% extends "base.html" %}
{% block title %}Admin · Equipamentos Terra da Gente{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-md-5">
  <div class="card">
    <div class="card-header py-2 fw-semibold">
      <i class="bi bi-shield-lock me-2"></i>Acesso administrativo
    </div>
    <div class="card-body">
      <form method="POST">
        <label class="form-label fw-semibold">Chave de administrador</label>
        <input type="password" name="chave" class="form-control mb-3"
               placeholder="Digite a chave" autofocus required>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-unlock me-1"></i>Entrar
        </button>
      </form>
    </div>
  </div>
  <p class="text-muted small text-center mt-3">
    Esta área é destinada à configuração do armazenamento de fotos.
  </p>
</div>
</div>
{% endblock %}
