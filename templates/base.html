<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Equipamentos AV{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --tv-azul: #003087;
      --tv-vermelho: #e30613;
    }
    body { background: #f4f6f9; font-family: 'Segoe UI', system-ui, sans-serif; }

    .navbar { background: var(--tv-azul) !important; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; color: #fff !important; }
    .navbar-brand span { color: var(--tv-vermelho); }

    .badge-campo  { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .badge-devolvido { background: #d1e7dd; color: #0a5f38; border: 1px solid #198754; }

    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 12px; }
    .card-header { border-radius: 12px 12px 0 0 !important; background: #fff; border-bottom: 1px solid #eee; }

    .btn-primary { background: var(--tv-azul); border-color: var(--tv-azul); }
    .btn-primary:hover { background: #002070; border-color: #002070; }
    .btn-danger { background: var(--tv-vermelho); border-color: var(--tv-vermelho); }

    .foto-thumb { width: 100%; max-height: 320px; object-fit: cover; border-radius: 8px; cursor: zoom-in; }
    .foto-placeholder {
      width: 100%; min-height: 180px; border: 2px dashed #ced4da;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: #adb5bd; flex-direction: column; gap: 8px;
    }
    .foto-placeholder i { font-size: 2.5rem; }

    .stat-card { border-radius: 12px; padding: 1.25rem 1.5rem; color: #fff; }
    .stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: .8rem; opacity: .85; }

    .reg-card { transition: transform .15s, box-shadow .15s; }
    .reg-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.1); }

    /* Lightbox simples */
    #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
      z-index:9999; align-items:center; justify-content:center; }
    #lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; }
    #lightbox.open { display:flex; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-camera-video-fill me-2"></i>Equip<span>AV</span>
    </a>
    <div class="d-flex gap-2">
      <a href="{{ url_for('admin') }}" class="btn btn-sm btn-outline-light" title="Configurações">
        <i class="bi bi-gear"></i>
      </a>
      <a href="{{ url_for('novo') }}" class="btn btn-sm btn-outline-light">
        <i class="bi bi-plus-lg me-1"></i>Nova saída
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">

  {% with msgs = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ 'success' if cat == 'ok' else 'danger' }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lb-img" src="" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('.foto-thumb').forEach(img => {
    img.addEventListener('click', () => {
      document.getElementById('lb-img').src = img.src;
      document.getElementById('lightbox').classList.add('open');
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
